# Cloudflare Workers — edge cache, security headers, image optimization
# Deploy: npm run cloudflare:deploy (requires zone on Cloudflare, DNS gray cloud → Vercel)
# https://developers.cloudflare.com/workers/wrangler/configuration/

name = "calldrboyle-com"
main = "workers/_worker.ts"
compatibility_date = "2026-02-13"
compatibility_flags = ["nodejs_compat"]

account_id = "" # Cloudflare account ID
workers_dev = true

[vars]
DEBUG = "false"
SITE_HOST = "www.calldrboyle.com"

[build]
command = ""

[[routes]]
pattern = "calldrboyle.com/*"
zone_name = "calldrboyle.com"

[[routes]]
pattern = "www.calldrboyle.com/*"
zone_name = "calldrboyle.com"

[dev]
port = 8787
local_protocol = "http"

[env.production]
name = "calldrboyle-com-production"
vars = { DEBUG = "false", SITE_HOST = "www.calldrboyle.com" }

[[env.production.routes]]
pattern = "calldrboyle.com/*"
zone_name = "calldrboyle.com"

[[env.production.routes]]
pattern = "www.calldrboyle.com/*"
zone_name = "calldrboyle.com"

[env.staging]
name = "calldrboyle-com-staging"
vars = { DEBUG = "true" }

[observability]
enabled = true
head_sampling_rate = 1

[limits]
cpu_ms = 50
